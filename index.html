          <script type="module">
            import * as THREE from "three";
            // カメラ操作など拡張機能を使いたい場合は以下のようにインポート可能
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
            
            // シーン、カメラ、レンダラーのセットアップ
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // ⚡【修正】document.body ではなく、新しく作った透明な箱をターゲットにする
            const controls = new OrbitControls(camera, document.getElementById('orbit-target'));
            
             // マウス操作の動きを滑らかにする設定（オプション：お好みで）
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;


            // add an Icosahedron
            const geometry = new THREE.IcosahedronGeometry();
            //empty array
            const icosahedrons = [];
            const COUNT = 30;

            for (let i = 0; i < COUNT; i++ ){
              const color = new THREE.Color();
              color.setHSL(((COUNT - i * 0.25) / COUNT + 0.65), 1, 0.5)
              const material = new THREE.MeshBasicMaterial({ color: color, wireframe: true})
              const mesh = new THREE.Mesh(geometry, material)
              scene.add(mesh)
              icosahedrons.push({
                mesh: mesh,
                speedX: 0.01 - (i * 0.0001),
                speedY: 0.01 - (i * 0.0001)
              });
            }

            camera.position.z = 1.5;
             
            // アニメーションループ
            function animate() {
              requestAnimationFrame(animate);
              
              icosahedrons.forEach( item => {
                item.mesh.rotation.x += item.speedX;
                item.mesh.rotation.y += item.speedY;
              })

              controls.update();
              renderer.render(scene, camera);
            }
            animate();
    </script>
